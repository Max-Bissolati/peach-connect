<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#EC5228" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://api.github.com https://analytics.thingymajigs.app; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://analytics.thingymajigs.app; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" />
    <link rel="manifest" id="pwa-manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="%PUBLIC_URL%/favicon-96x96.png" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <script>
      // Update manifest link immediately based on URL slug (before React loads)
      (function() {
        const path = window.location.pathname || '';
        const slug = path.replace(/^\//, '').split('/')[0]; // Get first path segment
        if (slug && slug !== 'admin' && slug !== '') {
          const manifestLink = document.getElementById('pwa-manifest') || document.querySelector('link[rel="manifest"]');
          if (manifestLink) {
            const newHref = '/manifest/' + slug + '.json';
            manifestLink.setAttribute('href', newHref);
          }
        }
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Peach Payments</title>
    <!-- Inline theme pre-load to avoid flash of incorrect theme -->
    <script>
      (function() {
        const stored = localStorage.getItem('darkMode');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const shouldBeDark = stored === 'true' || (stored === null && prefersDark);
        if (shouldBeDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      /* Hide scrollbar for IE, Edge and Firefox */
      .scrollbar-hide { -ms-overflow-style: none;  scrollbar-width: none; }
      /* Animation Utilities */
      .animate-in { animation: animate-in 0.5s ease-out forwards; }
      @keyframes animate-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

      /* ===== PEACH PAYMENTS BRAND OVERRIDES ===== */
      :root {
        --color-main-light: #ffffff !important;
        --color-main-dark: #070A43 !important;
        --color-card-light: #ffffff !important;
        --color-card-dark: #0d114f !important;
        --color-surface-light: #f8f4f4 !important;
        --color-surface-dark: #0a0e3a !important;
        --color-action-light: #EC5228 !important;
        --color-action-dark: #EC5228 !important;
        --color-action-hover-light: #d44a22 !important;
        --color-action-hover-dark: #d44a22 !important;
        --color-text-primary-light: #343666 !important;
        --color-text-primary-dark: #ffffff !important;
        --color-text-secondary-light: #6b6978 !important;
        --color-text-secondary-dark: #b8b6c4 !important;
        --color-confirm-light: #EC5228 !important;
        --color-confirm-dark: #EC5228 !important;
        --color-confirm-hover-light: #d44a22 !important;
        --color-confirm-hover-dark: #d44a22 !important;
        --color-link-light: #EC5228 !important;
        --color-link-dark: #EC5228 !important;
        --color-focus-ring-light: rgba(236,82,40,0.3) !important;
        --color-focus-ring-dark: rgba(236,82,40,0.4) !important;
        --color-border-light: #d7d8e6 !important;
        --color-border-dark: #1a1f5e !important;
        --texture-main-light: url(/textures/pp-orange-bg.png) !important;
      }

      /* Card page: text color overrides */
      h1, h2, .text-2xl, .text-xl, [class*='text-2xl'], [class*='text-xl'],
      .text-text-primary { color: var(--color-text-primary-light) !important; }
      .dark .text-text-primary { color: var(--color-text-primary-dark) !important; }

      .bg-main h1, .bg-main h2, .bg-main h3, .bg-main-dark h1, .bg-main-dark h2, .bg-main-dark h3,
      .bg-card h1, .bg-card h2, .bg-card-dark h1, .bg-card-dark h2 {
        color: #ffffff !important;
      }

      button.bg-action, button.bg-confirm, .bg-action, .bg-confirm {
        background-color: #EC5228 !important;
        color: #ffffff !important;
      }
      button.bg-action:hover, button.bg-confirm:hover {
        background-color: #d44a22 !important;
      }

      .card-title, .job-title, [class*=job], [class*=title] {
        color: #ffffff !important;
        text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      }

      a, .text-link, [class*=text-link] { color: #FFC539 !important; }
      a:hover { color: #e6b125 !important; }

      /* CTA link rows — white text */
      a.rounded-input { color: #ffffff !important; }
      a.rounded-input:hover { color: #ffffff !important; opacity: 0.9; }
      a.rounded-input svg { color: #ffffff !important; }

      .bg-main, body { background-color: #ffffff !important; }
      .dark .bg-main, .dark body { background-color: #070A43 !important; }

      .swiish-logo { filter: none !important; opacity: 1 !important; height: 32px !important; }
      .dark .swiish-logo { filter: none !important; opacity: 1 !important; }
      .group:hover .swiish-logo { filter: none !important; opacity: 1 !important; }
    </style>
    <script defer src="https://analytics.thingymajigs.app/api/script" data-site-id="1"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
